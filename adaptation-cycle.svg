<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Adaptation cycle diagram</title>
  <desc id="desc">A diagram showing variable speech input moving through perception, learning, adaptation, and later speech and lexical processing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef6f8"/>
      <stop offset="1" stop-color="#fffdf8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#173b57" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c46a3a"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="720" height="380" rx="28" fill="url(#bg)" stroke="#ddd3c4" stroke-width="2" filter="url(#shadow)"/>
  <text x="58" y="68" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="5" fill="#4b8a8f">ADAPTATION CYCLE</text>
  <text x="58" y="98" font-family="Inter, Arial, sans-serif" font-size="13" fill="#667085">How experience with variable speech may reshape later processing</text>

  <path d="M151 222 C190 142, 293 138, 342 205" fill="none" stroke="#c46a3a" stroke-width="3" marker-end="url(#arrow)" opacity=".9"/>
  <path d="M410 206 C459 138, 566 143, 609 221" fill="none" stroke="#c46a3a" stroke-width="3" marker-end="url(#arrow)" opacity=".9"/>
  <path d="M606 287 C526 354, 226 353, 151 289" fill="none" stroke="#4b8a8f" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)" opacity=".85"/>

  <g transform="translate(80 135)">
    <rect width="145" height="145" rx="22" fill="#fffdf8" stroke="#ddd3c4" stroke-width="2"/>
    <circle cx="72" cy="48" r="32" fill="#e8f0f4"/>
    <path d="M52 40 h40 M58 40 v42 M86 40 v42" stroke="#173b57" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M45 82 v-14 c0-10 7-18 17-20 M100 82 v-14 c0-10-7-18-17-20" stroke="#9aa4b2" stroke-width="7" stroke-linecap="round" fill="none"/>
    <text x="72" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">Input</text>
    <text x="72" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#667085">variable speech</text>
  </g>

  <g transform="translate(308 135)">
    <rect width="145" height="145" rx="22" fill="#fffdf8" stroke="#ddd3c4" stroke-width="2"/>
    <circle cx="72" cy="48" r="32" fill="#f7e7d9"/>
    <path d="M82 27 C55 28 52 57 65 66 C73 71 79 65 76 57 C73 48 85 45 86 57 C87 72 72 84 57 72 C37 56 47 22 79 18 C102 15 112 35 105 54 C101 65 91 70 84 81" fill="none" stroke="#c46a3a" stroke-width="7" stroke-linecap="round"/>
    <text x="72" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">Perception</text>
    <text x="72" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#667085">cue weighting</text>
  </g>

  <g transform="translate(535 135)">
    <rect width="145" height="145" rx="22" fill="#fffdf8" stroke="#ddd3c4" stroke-width="2"/>
    <circle cx="72" cy="48" r="32" fill="#e8efe8"/>
    <path d="M48 52 C40 31 67 23 73 41 C84 20 110 36 97 56 C111 69 91 89 76 73 C64 91 37 75 52 57" fill="#4b8a8f" opacity=".55"/>
    <path d="M50 55 C38 34 66 24 72 42 M72 42 C83 20 111 36 97 56 M97 56 C113 70 91 92 76 73 M76 73 C63 92 35 76 52 57" fill="none" stroke="#173b57" stroke-width="4" stroke-linecap="round"/>
    <text x="72" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#172033">Learning</text>
    <text x="72" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#667085">experience</text>
  </g>

  <g transform="translate(194 258)">
    <rect width="180" height="82" rx="18" fill="#fffdf8" stroke="#ddd3c4" stroke-width="2"/>
    <g transform="translate(24 17)" stroke="#173b57" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="10" x2="62" y2="10"/><line x1="0" y1="34" x2="62" y2="34"/>
      <circle cx="18" cy="10" r="7" fill="#f2c66d"/><circle cx="44" cy="34" r="7" fill="#4b8a8f"/>
    </g>
    <text x="115" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">Adaptation</text>
    <text x="115" y="56" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#667085">system change</text>
  </g>

  <g transform="translate(422 258)">
    <rect width="205" height="82" rx="18" fill="#fffdf8" stroke="#ddd3c4" stroke-width="2"/>
    <g transform="translate(22 18)">
      <rect width="48" height="42" rx="6" fill="#e8f0f4" stroke="#173b57" stroke-width="3"/>
      <path d="M7 32 L17 22 L26 27 L38 10" fill="none" stroke="#4b8a8f" stroke-width="4" stroke-linecap="round"/>
    </g>
    <text x="130" y="34" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#172033">Later processing</text>
    <text x="130" y="57" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#667085">speech + lexical</text>
  </g>
</svg>
