<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Pixel Lab research map</title>
  <desc id="desc">A coordinated playful pixel-style research visualization for speech perception, adaptation, learning, and later lexical processing.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#173b57"/>
      <stop offset="1" stop-color="#102d42"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff4d7"/>
      <stop offset="1" stop-color="#fff9eb"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2.4" fill="#e7c98f" opacity=".55"/>
    </pattern>
    <filter id="pixshadow">
      <feDropShadow dx="6" dy="6" stdDeviation="0" flood-color="#071a26" flood-opacity=".35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c76a3a"/>
    </marker>
  </defs>
  <rect width="1180" height="720" fill="url(#sky)"/>
  <rect x="22" y="22" width="1136" height="676" fill="#fff0c8" stroke="#d7a86e" stroke-width="6"/>
  <rect x="40" y="40" width="1100" height="640" fill="url(#dots)" opacity=".9"/>

  <rect x="70" y="72" width="650" height="210" rx="6" fill="url(#paper)" stroke="#173b57" stroke-width="6" filter="url(#pixshadow)"/>
  <text x="112" y="122" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#173b57">Pixel Lab</text>
  <text x="114" y="160" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="4" fill="#4b8a8f">A PLAYFUL MAP OF MY RESEARCH QUESTIONS</text>
  <text x="114" y="204" font-family="Inter, Arial, sans-serif" font-size="24" fill="#172033">How do listeners adapt to variability in spoken language?</text>
  <text x="114" y="238" font-family="Inter, Arial, sans-serif" font-size="20" fill="#667085">speech perception · speech learning · speech adaptation · later lexical processing</text>

  <rect x="762" y="72" width="348" height="210" rx="6" fill="#9fc9dc" stroke="#9d6b35" stroke-width="7" filter="url(#pixshadow)"/>
  <rect x="762" y="170" width="348" height="55" fill="#82b678"/>
  <rect x="762" y="225" width="348" height="57" fill="#7a4d2e"/>
  <circle cx="936" cy="151" r="55" fill="#e8bd96" stroke="#5e3928" stroke-width="8"/>
  <path d="M870 128 C875 75 1006 75 1008 128 C989 98 897 99 870 128" fill="#1e2225"/>
  <rect x="862" y="218" width="148" height="60" rx="24" fill="#275d73" stroke="#0d2636" stroke-width="8"/>
  <rect x="785" y="248" width="130" height="42" fill="#51331f" stroke="#d7a86e" stroke-width="4"/>
  <text x="804" y="276" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#fff4d7">Jiaxing Lin</text>

  <rect x="70" y="320" width="270" height="160" rx="6" fill="#fff9eb" stroke="#173b57" stroke-width="5" filter="url(#pixshadow)"/>
  <rect x="70" y="320" width="270" height="42" fill="#173b57"/>
  <text x="92" y="348" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#fff4d7">1  VARIABLE SPEECH</text>
  <path d="M108 414 C138 365 191 372 210 408 C234 450 286 436 302 386" fill="none" stroke="#4b8a8f" stroke-width="10" stroke-linecap="square"/>
  <text x="102" y="458" font-family="Inter, Arial, sans-serif" font-size="18" fill="#172033">input differs across speakers, accents, and contexts</text>

  <rect x="455" y="320" width="270" height="160" rx="6" fill="#fff9eb" stroke="#3f6f43" stroke-width="5" filter="url(#pixshadow)"/>
  <rect x="455" y="320" width="270" height="42" fill="#3f6f43"/>
  <text x="477" y="348" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#fff4d7">2  PERCEPTION</text>
  <path d="M596 379 C548 383 541 439 570 449 C587 455 598 442 590 428 C582 412 608 407 610 430 C612 456 586 484 552 466" fill="none" stroke="#c46a3a" stroke-width="12" stroke-linecap="round"/>
  <text x="492" y="458" font-family="Inter, Arial, sans-serif" font-size="18" fill="#172033">listeners weigh acoustic and contextual cues</text>

  <rect x="840" y="320" width="270" height="160" rx="6" fill="#fff9eb" stroke="#173b57" stroke-width="5" filter="url(#pixshadow)"/>
  <rect x="840" y="320" width="270" height="42" fill="#173b57"/>
  <text x="862" y="348" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800" fill="#fff4d7">3  LEARNING</text>
  <path d="M928 422 C896 382 943 361 965 396 C985 359 1037 383 1010 426 C1042 450 999 490 968 455 C939 493 891 459 928 422" fill="#e8a5c8" stroke="#9b4f72" stroke-width="6"/>
  <text x="876" y="458" font-family="Inter, Arial, sans-serif" font-size="18" fill="#172033">experience updates expectations over time</text>

  <path d="M350 400 H438" stroke="#c76a3a" stroke-width="6" marker-end="url(#arrow)"/>
  <path d="M735 400 H823" stroke="#c76a3a" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="240" y="535" width="330" height="110" rx="6" fill="#fff9eb" stroke="#9d6b35" stroke-width="5" filter="url(#pixshadow)"/>
  <text x="270" y="573" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#173b57">ADAPTATION</text>
  <g transform="translate(430 554)" stroke="#173b57" stroke-width="6" stroke-linecap="square">
    <line x1="0" y1="8" x2="78" y2="8"/><line x1="0" y1="42" x2="78" y2="42"/>
    <circle cx="25" cy="8" r="9" fill="#f2c66d"/><circle cx="56" cy="42" r="9" fill="#4b8a8f"/>
  </g>
  <text x="270" y="611" font-family="Inter, Arial, sans-serif" font-size="18" fill="#172033">What changes in the listener’s speech perception system?</text>

  <rect x="635" y="535" width="330" height="110" rx="6" fill="#fff9eb" stroke="#3f6f43" stroke-width="5" filter="url(#pixshadow)"/>
  <text x="665" y="573" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#173b57">LATER PROCESSING</text>
  <rect x="845" y="555" width="64" height="54" rx="6" fill="#e8f0f4" stroke="#173b57" stroke-width="5"/>
  <path d="M855 598 L868 580 L879 588 L899 564" fill="none" stroke="#4b8a8f" stroke-width="6"/>
  <text x="665" y="611" font-family="Inter, Arial, sans-serif" font-size="18" fill="#172033">How does adaptation affect speech and lexical processing?</text>

  <path d="M915 485 C888 523 799 526 745 535" fill="none" stroke="#4b8a8f" stroke-width="5" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <path d="M405 535 C336 516 253 505 190 482" fill="none" stroke="#4b8a8f" stroke-width="5" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
</svg>
